# Conflict View — Cloudflare Workers Cron Ingest
# FIRMS + GDELT + news/AIS/ADS-B/tunnels warm → D1
# Docs: workers/cron-ingest/README.md
#
# Deploy:  npm run cf:ingest:deploy
# Migrate: npm run cf:d1:migrate:remote
# Secret:  npx wrangler secret put NASA_FIRMS_API_KEY -c wrangler.ingest.toml
# Optional warm URLs (Next app):
#   NEWS_WARM_URL / VIDEO_NEWS_WARM_URL / AIS_WARM_URL / ADSB_WARM_URL / TUNNELS_WARM_URL
#   INGEST_CRON_SECRET

name = "conflict-view-ingest"
main = "workers/cron-ingest/src/index.ts"
compatibility_date = "2025-10-11"
workers_dev = true

# Optional: allow lightweight URL/Buffer helpers if needed later
compatibility_flags = []

[vars]
# Theater FIRMS day window (1–5). SNPP+NOAA20+NOAA21 병합이라 2일이면 충분.
FIRMS_DAY_RANGE = "2"
# Cap per FIRMS theater bbox insert
FIRMS_MAX_PER_THEATER = "400"
# GDELT Geo API — 키워드 범위는 넓히되 총량 캡 (쿼리당·전체 하드캡은 gdelt.ts)
GDELT_MAX_POINTS = "250"
# Retain window for prune (hours)
RETENTION_HOURS = "48"

[[d1_databases]]
binding = "DB"
database_name = "conflict-view-db"
database_id = "7e44bacd-d2f1-4c77-84c2-7be6b90fa0ae"
migrations_dir = "drizzle"

# Every 10 minutes
[triggers]
crons = ["*/10 * * * *"]

# Local secrets: copy .dev.vars.example → .dev.vars (gitignored)
# Production: wrangler secret put NASA_FIRMS_API_KEY
# Optional: wrangler secret put INGEST_CRON_SECRET
